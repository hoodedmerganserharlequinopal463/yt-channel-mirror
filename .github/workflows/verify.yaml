name: Verify

on:
  pull_request:
    branches:
      - main

jobs:
  static-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.1
      - run: deno install
      - run: deno fmt --check
      - run: deno lint
      - run: deno check
